name: loom-code CI

# Runs loom-code's drift gates on every PR that touches the plugin (or
# the workflow itself), and on every push to main that changes the plugin.
#
# Two SSOT drift gates are enforced:
#
#   - verify-drift.py:        the code-team <-> loom-code knowledge SSOT —
#                             every routed functional copy must stay
#                             byte-identical to its canonical payload.
#   - sync_codex_manifests.py: the Codex plugin manifest SSOT —
#                             each CODEX_ELIGIBLE plugin's .codex-plugin/plugin.json
#                             must stay in sync with its .claude-plugin/plugin.json.
#                             Any manual edit that diverges the two, or a missing
#                             eligible Codex manifest, fails the build. Repair
#                             locally with: python scripts/sync_codex_manifests.py --all
#
# The sync_codex_manifests.py pytest suite is also run so the generator logic
# itself is covered, mirroring legal-toolkit-ci.yml (pytest + drift).
#
# Status: intended for `main` branch protection.

on:
  pull_request:
    branches: [main]
    paths:
      - 'loom-code/**'
      # The living-spec gates scan the repo root and check the committed
      # docs/loom/INDEX.md, so a docs/loom/** change must also trigger CI —
      # else an index drift or a spec-tree edit could merge ungated.
      - 'docs/loom/**'
      # The Codex drift gate runs --all (every plugin's manifest pair), so the
      # trigger scope must match: ANY plugin's manifest edit must fire CI, else
      # a drift in a non-loom-code plugin merges ungated (fail-open).
      - '**/.claude-plugin/plugin.json'
      - '**/.codex-plugin/plugin.json'
      # Same rule for the pytest step: it runs the WHOLE `scripts/` dir, so the
      # trigger must be the whole dir too. Enumerating filenames here is what
      # already drifted once — scripts/check_version_bump.py was added with its
      # 9 tests and never listed, so a PR editing only that gate ran none of
      # them (fail-open on the gate's own maintenance).
      - 'scripts/**'
      # scripts/test_bucket_vocabulary_consistency.py pins the three-bucket
      # research-routing vocabulary (craft / domain-convention / project-local)
      # byte-identical across loom-code, loom-spec, loom-discovery,
      # loom-product-principles, and loom-interface-design — but only
      # loom-code/** is otherwise in this trigger, so an edit to just one of
      # these foreign carrier files would merge ungated without these
      # explicit lines (docs/loom/plans/2026-07-18-knowledge-triage-
      # three-buckets.md task 5, extended by task 11).
      - 'loom-spec/skills/spec-expansion/references/domain-tag-triage.md'
      - 'loom-discovery/skills/user-insights/assets/evidence-template.md'
      - 'loom-product-principles/skills/product-principles/references/knowledge-triage.md'
      - 'loom-interface-design/skills/interaction-flows/references/knowledge-triage.md'
      - 'loom-interface-design/skills/design-system/references/knowledge-triage.md'
      - '.github/workflows/loom-code-ci.yml'
  push:
    branches: [main]
    paths:
      - 'loom-code/**'
      - 'docs/loom/**'
      - '**/.claude-plugin/plugin.json'
      - '**/.codex-plugin/plugin.json'
      - 'scripts/**'
      - 'loom-spec/skills/spec-expansion/references/domain-tag-triage.md'
      - 'loom-discovery/skills/user-insights/assets/evidence-template.md'
      - 'loom-product-principles/skills/product-principles/references/knowledge-triage.md'
      - 'loom-interface-design/skills/interaction-flows/references/knowledge-triage.md'
      - 'loom-interface-design/skills/design-system/references/knowledge-triage.md'

permissions:
  contents: read

jobs:
  test:
    name: pytest + knowledge-drift + codex-manifest-drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test deps
        # pytest = test runner. The drift + sync scripts are pure stdlib (P1-E).
        run: python3 -m pip install --quiet pytest

      - name: Run pytest suites (loom-code + codex-compat engine + hook)
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python3 -m pytest loom-code/scripts/ scripts/ .claude/hooks/ -v

      - name: Verify code-team <-> loom-code knowledge SSOT
        # canonical/ is the single source of truth; each skill carries routed
        # functional copies. Any byte-level divergence fails the build.
        run: python3 loom-code/scripts/verify-drift.py

      - name: Codex manifest drift gate (all plugins)
        # Each CODEX_ELIGIBLE plugin's .codex-plugin/plugin.json is generated
        # from its .claude-plugin/plugin.json. --check --all fails (exit 1) on
        # any drift OR any missing eligible manifest across all plugins, so a
        # manual edit can't diverge the two.
        run: python3 scripts/sync_codex_manifests.py --check --all

      - name: Verify skill cross-references resolve
        # Every relative markdown link in a SKILL.md must point at an existing
        # file. Guards the cross-skill reference convention (e.g. the shared
        # references/environment-gotchas.md pointers) against silent breakage.
        run: python3 loom-code/scripts/check-skill-crossrefs.py

      - name: Verify living-spec structural integrity
        # Hard FAIL on every push: every @req tag in the repo source tree must
        # resolve to a real requirement id and be well-formed. A dangling or
        # malformed @req exits 1 and fails the build.
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python3 loom-code/scripts/check-living-spec-index.py .

      - name: Verify living-spec index is current
        # Byte-identity gate: regenerate build_index over the repo root and
        # byte-compare to the committed docs/loom/INDEX.md. Any drift exits 1
        # so a stale committed index can't slip in. Repair locally with:
        # python3 loom-code/scripts/check-living-spec-index.py --write-index docs/loom/INDEX.md .
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python3 loom-code/scripts/check-living-spec-index.py --verify-index docs/loom/INDEX.md .

      - name: Verify living-spec active reqs are covered
        # Merge-boundary gate: every `active` requirement must have a passing
        # test. This runs AFTER the green pytest gate above, so a green suite
        # means every linked test passed — "0 passing" therefore reduces to
        # "0 linked", and an uncovered active req exits 1. Unlike --verify-index,
        # this gate regenerates nothing (no --write-index counterpart); it only
        # reads the persisted intent + @req links and reports coverage.
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python3 loom-code/scripts/check-living-spec-index.py --check-coverage .

      # Only the 3 repo-state-only .sh tests run here. The other 5 under
      # tests/integration/ probe the LOCAL Claude CLI install state
      # (`claude plugin list`, enabled-plugin checks) and are meaningless
      # or flaky on a runner with no `claude` binary — they stay local-only.
      # One step per test with `!cancelled()` so each reports even when a
      # sibling fails (same visibility pattern as skill-structure.yml).
      - name: Integration test — command-surface accretion
        if: ${{ !cancelled() }}
        run: bash loom-code/tests/integration/test-command-surface-accretion.sh

      - name: Integration test — command-surface resolution
        if: ${{ !cancelled() }}
        run: bash loom-code/tests/integration/test-command-surface-resolution.sh

      - name: Integration test — rule-sheet drift
        if: ${{ !cancelled() }}
        run: bash loom-code/tests/integration/test-rule-sheet-drift.sh
