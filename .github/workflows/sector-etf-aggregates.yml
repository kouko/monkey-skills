name: sector-etf-aggregates

# Weekly cron + manual dispatch: refresh the 11 SPDR sector-etf-aggregate-*.json
# files via investing-toolkit/skills/analysis-comps/scripts/etf_aggregator.py --all,
# then commit changes back to main.
#
# v2.2.0-c-bench T12 (plan: docs/superpowers/plans/2026-05-05-investing-toolkit-
# v2.2.0-c-bench-etf-aggregate.md). Saturday 06:00 UTC = Asia/Taipei Sat 14:00 —
# off-peak for both yfinance and SEC EDGAR. Caches both upstreams so warm runs
# stay under ~10 minutes; cold-start (cache miss) budget is 6h.
#
# On any failure, opens a tracking issue labelled `sector-aggregate-stale` and
# `ci-failure` so the staleness alarm in analysis-comps tests has a sibling
# signal at the CI layer.

on:
  schedule:
    - cron: '0 6 * * 6'   # Saturday 06:00 UTC = Asia/Taipei Sat 14:00
  workflow_dispatch:

permissions:
  contents: write          # commit weekly refresh + push the PR branch
  pull-requests: write     # open the PR + enable auto-merge
  issues: write            # auto-open tracking issue on failure

jobs:
  refresh-aggregates:
    name: Refresh SPDR sector ETF aggregates
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6h hard budget; warm-cache run ~5 min, cold ~2.5h
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        # Match repo convention from skill-structure.yml investing-toolkit-pytest-offline:
        # astral-sh/setup-uv@v4 with cache disabled (no uv.lock; PEP 723 inline metadata).
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Cache SEC EDGAR companyfacts
        uses: actions/cache@v4
        with:
          path: ~/.cache/investing-toolkit/sec_edgar/companyfacts
          key: companyfacts-${{ github.run_id }}
          restore-keys: |
            companyfacts-

      - name: Cache yfinance responses
        uses: actions/cache@v4
        with:
          path: ~/.cache/investing-toolkit/yfinance
          key: yfinance-${{ github.run_id }}
          restore-keys: |
            yfinance-

      - name: Aggregate all 11 SPDR sector ETFs
        id: aggregate
        run: |
          uv run investing-toolkit/skills/analysis-comps/scripts/etf_aggregator.py --all

      - name: Commit refreshed aggregates and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Use pathspec form so an empty match does not fail the step on the
          # first workflow_dispatch run (the aggregator creates the files
          # in-place; if --all succeeded, every JSON exists at this point).
          git add -- 'investing-toolkit/skills/analysis-comps/references/sector-etf-aggregate-*.json'
          if git diff --cached --quiet; then
            echo "no changes — aggregates unchanged this week"
            exit 0
          fi

          # main is a protected branch — direct push is rejected with GH006.
          # Commit to a fresh branch, open a PR, enable auto-merge so it lands
          # automatically once required status checks pass.
          BRANCH="chore/sector-aggregates-$(date -u +%Y-%m-%d)-${{ github.run_id }}"
          git switch -c "$BRANCH"
          git commit -m "chore(sector-aggregates): weekly refresh $(date -u +%Y-%m-%d)"
          # First push uses --set-upstream; if branch race-collides with a parallel
          # workflow_dispatch run sharing the date prefix, the run_id suffix should
          # disambiguate. No retry needed — we are pushing a fresh branch.
          git push --set-upstream origin "$BRANCH"

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(sector-aggregates): weekly refresh $(date -u +%Y-%m-%d)" \
            --body "Auto-generated by [\`sector-etf-aggregates\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.

          Refreshes the 11 SPDR sector ETF aggregate JSONs read by \`comps_compute.py --sector-benchmark\`. Auto-merges once required status checks pass.")

          echo "PR opened: $PR_URL"

          # Enable auto-merge (squash). Requires repo Settings → "Allow auto-merge".
          # If auto-merge is not enabled at the repo level, this will fail loudly so
          # the user knows to either enable it OR review the PR manually.
          if ! gh pr merge "$PR_URL" --auto --squash; then
            echo "::warning ::auto-merge could not be enabled — review the PR manually at $PR_URL"
            echo "  Possible cause: Settings → General → 'Allow auto-merge' is disabled."
            echo "  This is non-fatal — the PR is open and waiting."
          fi

      - name: Open issue on failure
        if: failure()
        run: |
          # Labels are best-effort — `gh issue create --label` errors hard if a
          # label doesn't exist in the repo, which would cascade-fail this step.
          # Create labels lazily so a missing label cannot silence the alert.
          gh label create sector-aggregate-stale --description "sector ETF aggregator weekly refresh failed" --color "B60205" --force || true
          gh label create ci-failure --description "scheduled CI run failed" --color "D93F0B" --force || true
          gh issue create \
            --title "sector-etf-aggregates weekly refresh failed (${{ github.run_id }})" \
            --body  "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "sector-aggregate-stale" \
            --label "ci-failure"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
