name: check-script-sync

# Verifies that cross-skill duplicated client scripts in investing-toolkit
# stay byte-identical.
#
# Post-ADR-0008 (2026-05-03): MCP server removed. The
# `investing-toolkit/scripts/` canonical-vs-skill-copy duality is gone;
# only true cross-skill duplications remain. Two groups enforced:
#
#   - yfinance_client.py: data-us reference; data-jp / data-tw / data-kr /
#                         data-cn (4 cross-skill copies must equal data-us)
#   - fred_client.py:     data-us reference; data-cn (1 cross-skill copy
#                         must equal data-us)
#
# All other clients (nbs/akshare/dgbas/ndc/cbc/statgov/fdr/boj/ecb/estat/
# sec_edgar/mops/edinet/finmind/twse_openapi/tdnet/ta) are single-skill —
# no cross-skill copies, no sync needed.
#
# research-toolkit (2026-06-03): deep-research is the SSOT for 4 reusable
# primitives (schemas/rank/prompts/dedup.py). Sibling skills (fact-check,
# cite-check) functional-copy them byte-identical into their own scripts/.
# One group per primitive enforces the copies equal deep-research. Copies
# may not exist yet — check_group auto-[skip]s missing copies.
#
# Status: REQUIRED on `main` branch protection.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check-script-sync:
    name: investing-toolkit script MD5 sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify cross-skill clients are byte-identical
        run: |
          python3 - <<'PY'
          import hashlib
          import subprocess
          import sys
          from pathlib import Path

          ROOT = Path("investing-toolkit/skills")

          def md5(path: Path) -> str:
              return hashlib.md5(path.read_bytes()).hexdigest()

          def show_diff(reference: Path, drift_path: Path) -> None:
              # On drift, surface up to 50 lines of unified diff so reviewers see
              # WHAT differs, not just THAT it differs.
              try:
                  out = subprocess.run(
                      ["diff", "-u", str(reference), str(drift_path)],
                      capture_output=True,
                      text=True,
                      check=False,
                  )
                  text = out.stdout or out.stderr or ""
                  lines = text.splitlines()
                  for line in lines[:50]:
                      print(f"    {line}")
                  if len(lines) > 50:
                      print(f"    ... ({len(lines) - 50} more lines truncated)")
              except FileNotFoundError:
                  print("    (diff binary unavailable; md5 hashes above)")

          def check_group(label: str, reference: Path, copies: list[Path]) -> int:
              if not reference.is_file():
                  print(f"[FAIL] {label}: reference not found: {reference}")
                  return 1
              ref_hash = md5(reference)
              existing = [p for p in copies if p.is_file()]
              if not existing:
                  print(f"[skip] {label}: no copies found yet")
                  return 0
              hashes = {p: md5(p) for p in existing}
              drift = [p for p, h in hashes.items() if h != ref_hash]
              if drift:
                  print(f"[FAIL] {label}: drift detected (reference: {reference})")
                  print(f"  reference md5 = {ref_hash}")
                  for p in drift:
                      print(f"  DRIFT  {p}  md5={hashes[p]}")
                      show_diff(reference, p)
                  return 1
              print(f"[ok]   {label}: {len(existing)} copies, all md5={ref_hash}")
              return 0

          errors = 0

          # Group 1: yfinance_client.py — cross-skill duplication.
          # data-us is the reference; 4 country copies must equal it.
          yf_reference = ROOT / "data-us" / "scripts" / "yfinance_client.py"
          yf_copies = [
              ROOT / skill / "scripts" / "yfinance_client.py"
              for skill in ["data-jp", "data-tw", "data-kr", "data-cn"]
          ]
          errors += check_group(
              "yfinance_client.py (data-us reference; jp/tw/kr/cn copies)",
              yf_reference,
              yf_copies,
          )

          # Group 2: fred_client.py — cross-skill duplication.
          # data-us is the reference; data-cn copy must equal it.
          fred_reference = ROOT / "data-us" / "scripts" / "fred_client.py"
          fred_copies = [ROOT / "data-cn" / "scripts" / "fred_client.py"]
          errors += check_group(
              "fred_client.py (data-us reference; data-cn copy)",
              fred_reference,
              fred_copies,
          )

          # research-toolkit groups: deep-research primitives are the SSOT;
          # sibling skills functional-copy them byte-identical. One group per
          # primitive. Copies may be absent (check_group [skip]s them).
          # NOTE: ROOT above points at investing-toolkit; build the
          # research-toolkit paths explicitly (also relative to checkout root).
          rt_skills = Path("research-toolkit/skills")
          rt_siblings = ["fact-check", "cite-check"]
          for primitive in ["schemas.py", "rank.py", "prompts.py", "dedup.py"]:
              rt_reference = rt_skills / "deep-research" / "scripts" / primitive
              rt_copies = [
                  rt_skills / skill / "scripts" / primitive
                  for skill in rt_siblings
              ]
              errors += check_group(
                  f"{primitive} (deep-research reference; fact-check/cite-check copies)",
                  rt_reference,
                  rt_copies,
              )

          if errors:
              print()
              print(f"FAIL: {errors} group(s) out of sync.")
              print("Fix locally: bash investing-toolkit/scripts/sync-clients.sh")
              print("         or: bash research-toolkit/scripts/sync-primitives.sh")
              sys.exit(1)

          print()
          print("OK: all cross-skill clients in sync.")
          PY
