# Taiwan calibration plumbed from references/thresholds-taiwan.md (per ADR-0004).
# Vintage: 2026-Q1 (full grounding 2026-04-18 v1.9.0; v1.11.0 partial refresh
# 2026-04-19; this 2026-05-02 partial delta — no material policy events,
# see research/grounding-tw-2026-05.md).
#
# Authority: 中央銀行 (CBC) + 國家發展委員會 (NDC) + 主計總處 (DGBAS)
# Currency: TWD
country: tw
authority: 中央銀行 (CBC) + 國家發展委員會 (NDC) + 主計總處 (DGBAS)
currency: TWD

# ---------------------------------------------------------------------------
# Inflation framing — TW does NOT publish a binding 2% target
# ---------------------------------------------------------------------------
# CBC 2024-06: "台灣作為小型開放經濟體，採具彈性的物價穩定定義" (CNA 2024-06-19).
# Note: CBC 理監事決議新聞稿 itself uses "適時調整", not "彈性"; 彈性 is
# 場外解釋語 only. Watchline 2% commonly cited but NOT binding.
inflation_target: null  # explicitly no numeric target
inflation_target_type: flexible
inflation_target_framework: 彈性定義  # CBC informal framing
inflation_target_authority_date: "2024-06-19"  # CNA primary report
cbc_framing: 彈性定義
cbc_formal_language: 適時調整貨幣政策，以達成物價穩定與金融穩定
inflation_watchline_pct: 2.0  # informal alert level — non-binding
inflation_signal_bands:
  above_watchline: { lower: 2.5 }
  near_watchline: { lower: 1.5, upper: 2.5 }
  below_watchline: { upper: 1.5 }

# ---------------------------------------------------------------------------
# Policy rate — CBC 貼現率
# ---------------------------------------------------------------------------
policy_rate:
  discount_rate: 2.00       # CBC 2024-09 cut to 2.00, maintained 2026-03-19
  collateralized_lending: 2.375
  short_term_financing: 4.25
  last_change: "2024-09-19"   # 25 bp cut
  last_meeting: "2026-03-19"  # all-pass continuation
  next_meeting: "2026-06-18"  # CBC Q2 理監事
policy_rate_neutrality:
  nominal_estimate_band: [1.75, 2.0]  # academic + market estimates (no CBC official r*)
  real_estimate_band: [0.0, 0.5]      # implied real r*
  source_note: |
    CBC does not publish an explicit r* / neutral rate. Estimates from
    CBC 季刊 NAIRU 專題 + market commentary. TW historically runs lower
    policy rates than US given structurally lower inflation
    (export-driven, price-taker economy). 2.00% is NOT particularly
    restrictive in TW historical terms — would be ~300 bp below US at
    2026-Q1.

# ---------------------------------------------------------------------------
# NAIRU — no official; academic estimates only
# ---------------------------------------------------------------------------
nairu:
  point_estimate: null  # 無官方值
  band: [3.5, 4.0]      # 學術推估
  source_note: |
    無官方值, 學術推估 3.5-4.0%. CBC 季刊 has 2 papers
    ("台灣地區無加速通膨失業率 NAIRU 之探討" + "應用勞動市場流動率
    探討台灣自然失業率"). Not a CBC policy anchor.
unemployment_bands:
  tight: { upper: 3.3 }
  balanced: { lower: 3.3, upper: 4.1 }
  slack: { lower: 4.1 }
unemployment_caveats:
  - hidden under-employment (part-time, informal sector)
  - youth 15-24 unemp ~12% (large differential vs headline)

# ---------------------------------------------------------------------------
# NDC 五色景氣燈號 (TW's official monthly cycle classifier)
# 2024 revision (current). Composite 9 indicators × 1-5 分 → 9-45 分.
# Revision history: 1978 / 1984 / 1989 / 1995 / 2001 / 2007 / 2013 / 2018 / 2024
# ---------------------------------------------------------------------------
ndc_signal:
  methodology_revision: "2024"  # current; previous revision was 2018
  score_range: [9, 45]
  bands:
    red:
      lower: 38
      upper: 45
      color_zh: "紅"
      color_en: "red"
      semantic: 景氣過熱
      phase: "Phase 2 Overheat"
    yellow_red:
      lower: 32
      upper: 37
      color_zh: "黃紅"
      color_en: "yellow-red"
      semantic: 景氣熱絡
      phase: "Phase 2 entering / Phase 1 late"
    green:
      lower: 23
      upper: 31
      color_zh: "綠"
      color_en: "green"
      semantic: 景氣穩定
      phase: "Phase 1 Recovery (mid)"
    yellow_blue:
      lower: 17
      upper: 22
      color_zh: "黃藍"
      color_en: "yellow-blue"
      semantic: 景氣欠佳
      phase: "Phase 3 early / Phase 4"
    blue:
      lower: 9
      upper: 16
      color_zh: "藍"
      color_en: "blue"
      semantic: 景氣低迷
      phase: "Phase 4 Reflation / deep slowdown"
  components_9:  # 2024-revision 9 構成項目 (corrected names per v1.9.0 grounding)
    - 貨幣總計數M1B變動率
    - 股價指數
    - 工業生產指數
    - 工業及服務業加班工時          # NOT 「非農業部門就業人數」(legacy mistake)
    - 海關出口值
    - 機械及電機設備進口值
    - 製造業銷售量指數
    - 批發、零售及餐飲業營業額
    - 製造業營業氣候測驗點          # TIER; NOT 「製造業存貨率比率」(legacy mistake)
  direction_mapping:
    rising:  "score >= 32 AND MoM rising"
    flat:    "23 <= score <= 31 AND no 3-month directional trend"
    falling: "score < 23"
  historic:
    no_red_window: { start: 2014, end: 2023, years: 10 }  # 十年無紅燈
    first_red_2024_02:
      score: 40
      note: "2024-02 首度破紅燈 + 創 31 年分數新高"
    recurrent_red_2026_02:
      score: 40
      note: "2026-02 再現紅燈 40 分 (third consecutive red light by 2026-02)"

# ---------------------------------------------------------------------------
# Real-rate decomposition — NOT AVAILABLE for TW
# ---------------------------------------------------------------------------
real_rate_4tier: null
real_rate_unavailable_reason: |
  Taiwan has no developed government inflation-linked bond market.
  通膨連動公債 issued infrequently with minimal secondary-market liquidity.
  No clean real-rate decomposition data path. Deferred indefinitely.

# ---------------------------------------------------------------------------
# Direction-classification calibration (mirrors legacy IC convention)
# ---------------------------------------------------------------------------
direction_band_stdev: 0.5
normalised_indicators:
  - signal-score   # 9-45 composite — already normalised by NDC

# ---------------------------------------------------------------------------
# Structural overlays applied by classify_tw.py
# ---------------------------------------------------------------------------
structural_overlays:
  - ndc_signal_color_score    # primary regime classifier (overrides IC interpretation)
  - components_9_dispersion   # cross-check whether components agree
  - tier_manufacturing_climate  # TIER subcomponent (when present)
  - tsmc_concentration        # TAIEX ≈ TSMC proxy
  - cpi_flexible_target       # 彈性定義 framing — supply-side vs demand-pull caveat

# ---------------------------------------------------------------------------
# TSMC + TAIEX concentration overlay (歷史最高)
# ---------------------------------------------------------------------------
tsmc_concentration:
  weight_pct: 44.30                # TWSE 2026-03-31 official
  top_10_pct: 58.27                # TWSE 2026-03-31 official
  tsmc_in_electronics_index_pct: 56.32  # TWSE 2026-03-31 official
  historic_5y_delta_pp: 17         # 2020 ~28% → 2026-03 44.30% (+17 pp, 歷史最高)
  trajectory:
    2020: 28
    2024_06: 34
    2026_03: 44.30
  tolerance_pp: 2.0   # within-quarter drift tolerance (next monthly TWSE update)
  note: |
    TSMC = TW equity cycle. TAIEX ≈ TSMC ADR 代理. Regime tilts MUST
    account for this concentration. Top-10 stocks make up ~60% of index.
  mid_april_2026_spot_estimate: 45.0  # HiStock/nStock 2026-03-10 reading; market data 2026-04 引述 40-45%

# ---------------------------------------------------------------------------
# Equity sector tilts (TW-specific adjustments to IC cheatsheet)
# ---------------------------------------------------------------------------
sector_tilts:
  recovery:
    overweight: [Semi (TSMC, UMC), electronics, shippers (semi inventory rebuild)]
    underweight: [Utilities, traditional industry]
  overheat:
    overweight: [Upstream semi, foundry, petrochemicals, real estate]
    underweight: [Long-dated bonds]
  stagflation:
    overweight: [Cash, utilities, defensive (telecoms)]
    underweight: [Semi, electronics (inventory risk)]
  reflation:
    overweight: [Financials (benefit from higher rates), bonds]
    underweight: [Semi, export-oriented]
heuristics:
  - "TW Phase 2 Overheat ≈ upside on TSMC"
  - "TW Phase 3 Stagflation ≈ beware chip inventory correction"

# ---------------------------------------------------------------------------
# Provenance
# ---------------------------------------------------------------------------
provenance:
  calibration_doc: thresholds-taiwan.md
  calibration_vintage: 2026-Q1
  last_full_grounding: "2026-04-18"
  partial_refresh: "2026-04-19"  # v1.11.0 addendum
  this_pr_partial_refresh: "2026-05-02"  # PR-4 delta — no material events
  authority_sources:
    - 中央銀行 CBC (理監事聯席會議新聞稿; 季刊 NAIRU 專題)
    - 國家發展委員會 NDC (景氣指標查詢系統; 景氣對策信號 methodology)
    - 主計總處 DGBAS (CPI; 失業率; 經濟成長預測)
    - 中華經濟研究院 CIER (Manufacturing PMI / Non-Manufacturing PMI)
    - 臺灣證券交易所 TWSE (TAIEX 加權指數成分股暨市值比重)
    - 中央社 CNA (2024-06-19 彈性定義 primary report)
