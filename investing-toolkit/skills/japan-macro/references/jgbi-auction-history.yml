# JGBi (10-year 物価連動国債) auction history — static snapshot
#
# Source: 財務省 (Ministry of Finance, Japan) 国債入札結果 (JGB auction results)
# https://www.mof.go.jp/jgbs/auction/calendar/nyusatsu/
#
# Purpose: primary-source anchor points for Japan 10Y real yield. JGBi is
# Japan's inflation-indexed government bond (principal 連動 with the全国
# CPI excluding fresh food, reset with ~3-month lag per 財務省 設計). The
# yield-at-auction is the official real-yield quote at issuance — complies
# with "primary-source grounding" for v1.10.0 investing-toolkit.
#
# v1.10.0 scope: human-curated static snapshot (re-issuance happens ~4x/year).
# v1.11.0 scope: automated MoF auction result scraper + 連動係数-driven
#                QuantLib YTM solver for daily JGBi yields (Bloomberg-grade).
#
# Fields:
#   issue_no        — 回号 (JGBi issue number, e.g. 30 = 第30回)
#   auction_date    — YYYY-MM-DD of auction
#   issue_date      — YYYY-MM-DD of issuance
#   coupon_pct      — クーポンレート (%; nominal coupon on principal)
#   highest_yield_pct — 募入最高利回り (real yield at highest accepted price, %,
#                     単利 simple-yield convention per MoF disclosure)
#   applications_oku  — 応募額 (¥億, tendered amount)
#   accepted_oku      — 募入決定額 (¥億, accepted face amount)
#   linkage_coefficient — 連動係数 at issue date (principal multiplier
#                         relative to 1.00 at original launch)
#   source_url        — 財務省 result page
#
# NOTE: "highest_yield_pct" is the marginal real yield (lowest accepted
# price → highest yield). Per MoF disclosure practice the 平均落札利回り
# is often not published separately for JGBi; the highest_yield is the
# published anchor quote.

